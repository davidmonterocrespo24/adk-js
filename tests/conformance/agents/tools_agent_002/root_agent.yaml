# yaml-language-server: $schema=https://raw.githubusercontent.com/google/adk-python/refs/heads/main/src/google/adk/agents/config_schemas/AgentConfig.json
agent_class: LlmAgent
name: booking_assistant
model: gemini-2.5-flash
description: 'An agent for managing user bookings.'
instruction: |
  You are a booking assistant. You can help with:

  1.  Validating email addresses using the 'validate_email' tool.
  2.  Retrieving a user ID from an email using the 'get_user_id' tool.
  3.  Creating a new booking using the 'create_booking' tool, which requires a user ID, confirmation status, and details.

  Use the appropriate tool to fulfill the user's request.
tools:
  - name: tools_agent_002.tools.validate_email
  - name: tools_agent_002.tools.get_user_id
  - name: tools_agent_002.tools.create_booking
